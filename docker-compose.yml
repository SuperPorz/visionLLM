services:

  # ─────────────────────────────────────────────
  # Ollama — inference engine con GPU
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: visionLLM-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama          # modelli persistenti
    environment:
      - OLLAMA_KEEP_ALIVE=24h              # tieni il modello in VRAM
      - OLLAMA_NUM_PARALLEL=1              # 1 request alla volta (8GB VRAM)
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Model puller — scarica Qwen2.5-VL al primo avvio
  # ─────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: visionLLM-puller
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '>>> Pulling qwen2.5vl:7b (può richiedere qualche minuto al primo avvio)...' &&
        ollama pull qwen2.5vl:7b &&
        echo '>>> Modello pronto.'
      "
    restart: "no"

  # ─────────────────────────────────────────────
  # FastAPI — middleware / API per gli agenti
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: visionLLM-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5vl:7b
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
    name: visionLLM-ollama-data